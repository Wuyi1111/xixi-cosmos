<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f1a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="description" content="息息·宇宙 — 一个温柔的睡前情绪陪伴 App" />
    <!-- 添加到 iOS 主屏后以独立 App 形态运行 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="息息·宇宙" />
    <!-- 关闭 iOS Safari 把数字串自动识别成电话链接（避免星际编号变成可拨电话） -->
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no" />
    <title>息息·宇宙 V4</title>
    <!--
      防暗色启动闪屏：必须 inline 在 <head> 里，于首次绘制前同步把主题 class 和
      字号 scale 写到 <html> 上。React 加载完成后会再做一遍，结果一致。
    -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('xixi_cosmos_theme') || 'light';
          var isDark;
          if (theme === 'dark') isDark = true;
          else if (theme === 'light') isDark = false;
          else {
            var h = new Date().getHours();
            isDark = (h >= 18 || h < 6);
          }
          var root = document.documentElement;
          if (isDark) {
            root.classList.add('dark');
            root.style.backgroundColor = '#0f0f1a';
            document.body && (document.body.style.backgroundColor = '#0f0f1a');
          } else {
            root.classList.add('light');
            root.style.backgroundColor = '#f8fafc';
          }
          // 同步字号缩放，避免基准 16→18.4 切换时整页字号"跳"一下
          var data = localStorage.getItem('xixi_cosmos_data');
          if (data) {
            var parsed = JSON.parse(data);
            var s = (parsed && typeof parsed.fontScale === 'number') ? parsed.fontScale : 1.0;
            root.style.fontSize = (18.4 * s) + 'px';
          } else {
            root.style.fontSize = '18.4px';
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/xixi-cosmos/assets/index-0UHJW6Ly.js"></script>
    <link rel="stylesheet" crossorigin href="/xixi-cosmos/assets/index-Ncx9qKuP.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
